<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پلتفرم سلامت روان - نسخه نهایی</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Link to Vazirmatn font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Vazirmatn', 'sans-serif'],
            },
            transitionProperty: {
              'width': 'width',
              'transform': 'transform',
            }
          },
        },
      };
    </script>
    <style>
        .sidebar { transition: transform 0.3s ease-in-out; }
        .main-content { transition: margin-right 0.3s ease-in-out; }
        
        /* Watermark */
        body::after {
            content: "Adel Is Testing";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: clamp(3rem, 8vw, 10rem);
            font-weight: 800;
            color: rgba(0, 0, 0, 0.04);
            z-index: 10000;
            pointer-events: none;
            white-space: nowrap;
            user-select: none;
        }
        
        /* Fix for number input spin buttons in Firefox */
        input[type=number] { -moz-appearance: textfield; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* --- NEW UI/UX STYLES --- */

        /* Sidebar Item States */
        .sidebar-item {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 0.75rem 1rem; /* 12px 16px */
            border-radius: 0.5rem; /* 8px */
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            text-align: right;
        }
        .sidebar-item .sidebar-icon {
            margin-left: 0.75rem; /* 12px */
            flex-shrink: 0;
        }

        /* State: Active (Current Step) */
        .sidebar-item[data-state="active"] {
            background-color: #DBEAFE; /* bg-blue-100 */
            color: #1D4ED8; /* text-blue-700 */
        }

        /* State: Completed (Visited) */
        .sidebar-item[data-state="completed"] {
            color: #374151; /* text-gray-700 */
        }
        .sidebar-item[data-state="completed"]:hover {
            background-color: #F3F4F6; /* bg-gray-100 */
            color: #000;
        }

        /* State: Locked (Not Unlocked) */
        .sidebar-item[data-state="locked"] {
            color: #9CA3AF; /* text-gray-400 */
            opacity: 0.7;
            pointer-events: none;
        }

        /* Kebab Menu (for Edit/Delete) */
        .kebab-dropdown {
            position: absolute;
            left: 0; /* Positioned to the left in RTL */
            top: 100%; /* Below the toggle button */
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #E5E7EB;
            z-index: 10;
            width: 140px;
            padding: 0.5rem;
        }
        .kebab-dropdown button {
            display: block;
            width: 100%;
            text-align: right;
            padding: 0.5rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
        }
        .kebab-dropdown button:hover {
            background-color: #F3F4F6;
        }

    </style>
</head>
<body class="bg-gray-100 font-sans flex flex-col min-h-screen">

    <!-- 1. APP SHELL -->
    <div id="app-container" class="w-full flex-grow"></div>
    
    <!-- Pop-up & Modal Containers -->
    <div id="message-box" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 py-3 px-6 rounded-full shadow-lg transition-opacity duration-500 opacity-0 hidden text-white font-bold text-center z-50"></div>
    <div id="edit-modal" class="fixed inset-0 w-full h-full z-40 hidden"></div>

    <!-- 2. JAVASCRIPT LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- SECTION 0: STATE DECLARATION (Initial Values) ---
            // Declared within DOMContentLoaded for safety against global scope issues
            let currentUser = null;
            let screeningAnswers = [];
            let thoughtLog = [];
            let screeningResults = null;
            let doubleStandardData = {
                friendName: '',
                adviceToFriend: '',
                sameWay: '',
                fairnessReflection: ''
            };
            let isLoginMode = true;
            let currentStepId = 'screening'; 
            let currentEntryId = null; 
            let isSidebarOpen = false;
            let unlockedSteps = ['screening'];
            
            // --- SECTION 1: GLOBAL STATE & UI SVGs ---
            
            // --- DOM Elements ---
            const appContainer = document.getElementById('app-container');
            const messageBox = document.getElementById('message-box');
            const editModalContainer = document.getElementById('edit-modal');

            // --- UI SVGs ---
            const icons = {
                screening: `<svg class="w-6 h-6 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>`,
                intro: `<svg class="w-6 h-6 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>`,
                log: `<svg class="w-6 h-6 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>`,
                identify: `<svg class="w-6 h-6 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>`,
                challenge: `<svg class="w-6 h-6 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`,
                balance: `<svg class="w-6 h-6 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v18m-6-6h12M6 9l-3 6h6l-3-6zm12 0l-3 6h6l-3-6z"></path></svg>`,
                completed: `<svg class="w-6 h-6 sidebar-icon text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
                locked: `<svg class="w-6 h-6 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>`,
                kebab: `<svg class="w-5 h-5 text-gray-500 hover:text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01"></path></svg>`
            };
            
            // --- App State ---
            const questions = [
                "1. احساس غم یا ناامیدی", "2. بی‌علاقگی یا لذت‌نبردن از فعالیت‌ها", "3. تغییر در اشتها یا وزن", "4. مشکلات خواب", "5. احساس خستگی مفرط", "6. احساس بی‌ارزشی یا گناه", "7. مشکل در تمرکز", "8. کندی یا بی‌قراری روانی-حرکتی", "9. افکار مرگ یا خودکشی", "10. احساس پوچی", "11. کاهش انگیزه", "12. انزوا از دیگران", "13. نگرانی مزمن و بی‌دلیل", "14. تنش عضلانی یا بی‌قراری", "15. تپش قلب ناگهانی", "16. تعریق زیاد", "17. لرزش یا احساس لرزش", "18. احساس خفگی یا تنگی نفس", "19. درد یا ناراحتی در قفسه سینه", "20. سرگیجه یا سبکی سر", "21. ترس از مردن", "22. ترس از دیوانه شدن", "23. جدا شدن از واقعیت", "24. از دست دادن کنترل", "25. انرژی زیاد یا غیرعادی", "26. نیاز کم به خواب", "27. پرحرفی", "28. افزایش عزت نفس یا بزرگ‌بینی", "29. افکار سریع", "30. حواس‌پرتی", "31. افزایش فعالیت هدف‌دار", "32. رفتارهای پرخطر", "33. تحریک‌پذیری شدید", "34. تصمیم‌گیری‌های غیرمنطقی", "35. ولخرجی یا بی‌ملاحظگی", "36. مصرف مواد یا الکل", "37. تغییرات خلق‌وخوی شدید", "38. فعالیت جنسی بیش‌ازحد", "39. ترس از فضاهای باز", "40. ترس از تنها ماندن", "41. ترس از حضور در مکان‌های شلوغ", "42. اجتناب از مکان‌های خاص", "43. افکار مزاحم و ناخواسته", "44. شک مداوم و وسواس فکری", "45. رفتارهای تکراری مثل شستن یا چک‌کردن", "46. ترس از قضاوت دیگران", "47. اجتناب از صحبت در جمع", "48. اضطراب در موقعیت‌های اجتماعی", "49. سرخ شدن یا لرزش در جمع"
            ];
            
            // --- Utility Functions ---
            
            const enforceNumberLimit = (e) => {
                if (e.target.type === 'number' && e.target.classList.contains('number-input')) {
                    let value = e.target.value.replace(/[^0-9]/g, '');
                    if (value === '') { e.target.value = ''; return; }
                    let num = parseInt(value, 10);
                    if (isNaN(num)) { e.target.value = ''; }
                    else if (num < 0) { e.target.value = 0; }
                    else if (num > 10) { e.target.value = 10; }
                    else { e.target.value = num; }
                }
            };
            document.addEventListener('input', enforceNumberLimit);

            const showMessage = (text, isError = false) => {
                messageBox.textContent = text;
                messageBox.classList.remove('hidden', 'opacity-0', 'bg-blue-500', 'bg-red-500');
                messageBox.classList.add('opacity-100', isError ? 'bg-red-500' : 'bg-blue-500');
                setTimeout(() => {
                    messageBox.classList.remove('opacity-100');
                    setTimeout(() => messageBox.classList.add('hidden'), 500);
                }, 3000);
            };

            const escapeHtml = (value) => {
                const div = document.createElement('div');
                div.textContent = value ?? '';
                return div.innerHTML;
            };

            const saveUserData = () => {
                if (!currentUser) return;
                let users = JSON.parse(localStorage.getItem('users')) || {};
                if (users[currentUser.email]) {
                    users[currentUser.email].answers = screeningAnswers;
                    users[currentUser.email].screeningResults = screeningResults;
                    users[currentUser.email].thoughtLog = thoughtLog;
                    users[currentUser.email].doubleStandard = doubleStandardData;
                    users[currentUser.email].unlockedSteps = unlockedSteps;
                    localStorage.setItem('users', JSON.stringify(users));
                }
                localStorage.setItem('currentStepId', currentStepId); 
            };

            const loadUserData = () => {
                // Read/Refresh global currentUser
                currentUser = JSON.parse(localStorage.getItem('currentUser')); 
                
                if (!currentUser) {
                    // Set safe initial defaults if logged out
                    screeningAnswers = new Array(questions.length).fill(false);
                    screeningResults = null;
                    thoughtLog = [];
                    doubleStandardData = {
                        friendName: '',
                        adviceToFriend: '',
                        sameWay: '',
                        fairnessReflection: ''
                    };
                    unlockedSteps = ['screening'];
                    currentStepId = 'screening';
                    return; 
                }

                let users = JSON.parse(localStorage.getItem('users')) || {};
                const userData = users[currentUser.email];
                
                if (userData) {
                    screeningAnswers = userData.answers || new Array(questions.length).fill(false);
                    screeningResults = userData.screeningResults || null;
                    thoughtLog = userData.thoughtLog || [];
                    doubleStandardData = userData.doubleStandard || {
                        friendName: '',
                        adviceToFriend: '',
                        sameWay: '',
                        fairnessReflection: ''
                    };
                    unlockedSteps = userData.unlockedSteps || ['screening']; 
                } else {
                    // Safety initialization for new/corrupt users
                    screeningAnswers = new Array(questions.length).fill(false);
                    screeningResults = null;
                    thoughtLog = [];
                    doubleStandardData = {
                        friendName: '',
                        adviceToFriend: '',
                        sameWay: '',
                        fairnessReflection: ''
                    };
                    unlockedSteps = ['screening'];
                }
                
                currentStepId = localStorage.getItem('currentStepId') || 'screening';
                if (currentStepId === 'doubleStandard') currentStepId = 'relaxation';
            };

            // NEW: Helper to unlock steps and re-render sidebar
            const unlockStep = (stepId) => {
                if (!unlockedSteps.includes(stepId)) {
                    unlockedSteps.push(stepId);
                    saveUserData();
                    renderSidebarNav(); 
                }
            };

            const navigateToStep = (stepId, shouldUnlock = false) => {
                currentStepId = stepId;
                if (shouldUnlock && !unlockedSteps.includes(stepId)) {
                    unlockedSteps.push(stepId);
                }
                saveUserData();
                mainRouter();
            };


            // --- SECTION 2: MODULE: CORE APP LAYOUT (Sidebar & Shell) ---
            
            const htmlTemplates_AppLayout = `
                <div class="flex w-full h-full">
                    <!-- Sidebar (Right) -->
                    <aside id="sidebar" class="w-64 bg-white shadow-lg p-6 flex flex-col flex-shrink-0
                                                fixed md:relative h-full
                                                transform md:translate-x-0 translate-x-full
                                                sidebar z-30
                                                right-0 top-0">
                        <div class="flex items-center justify-between mb-10">
                            <h2 class="text-2xl font-extrabold text-blue-800 text-center">
                                پلتفرم سلامت
                            </h2>
                            <button id="close-sidebar-btn" class="md:hidden p-1 text-gray-600 hover:text-black">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                        
                        <!-- NEW: Storytelling Nav Container -->
                        <nav id="sidebar-nav-container" class="flex flex-col gap-y-2"></nav>

                        <div class="mt-auto pt-6 border-t border-gray-200">
                            <p id="user-email-display" class="text-sm text-gray-500 mb-3 text-center truncate"></p>
                            <button id="logout-button" class="w-full px-4 py-2 bg-red-500 text-white rounded-lg shadow-sm hover:bg-red-600 text-sm font-semibold transition-all">
                                خروج از حساب
                            </button>
                        </div>
                    </aside>

                    <!-- Main Content (Left) -->
                    <main class="flex-1 w-full main-content md:mr-64 overflow-y-auto">
                        <div class="bg-white shadow-md p-4 flex items-center justify-between md:hidden sticky top-0 z-10">
                            <button id="open-sidebar-btn" class="p-2 text-gray-700">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                            </button>
                            <h3 class="font-bold text-lg text-blue-800" id="mobile-page-title"></h3>
                        </div>
                        <div id="page-content-container" class="p-4 md:p-8 max-w-7xl mx-auto"></div>
                    </main>
                    
                    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 md:hidden hidden"></div>
                </div>
            `;

            const openSidebar = () => {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                if (sidebar) sidebar.classList.remove('translate-x-full');
                if (overlay) overlay.classList.remove('hidden');
                isSidebarOpen = true;
            };
            
            const closeSidebar = () => {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                if (sidebar) sidebar.classList.add('translate-x-full');
                if (overlay) overlay.classList.add('hidden');
                isSidebarOpen = false;
            };
            
            // NEW: Rewritten to render the 5-step journey
            const renderSidebarNav = () => {
                const navContainer = document.getElementById('sidebar-nav-container');
                const userEmailDisplay = document.getElementById('user-email-display');
                
                if (!navContainer || !userEmailDisplay) return; 

                userEmailDisplay.textContent = currentUser.email;
                
                // Add listeners that only need to be set once
                if (!document.getElementById('logout-button')._listenerAttached) {
                    document.getElementById('logout-button').addEventListener('click', handleLogout);
                    document.getElementById('logout-button')._listenerAttached = true;
                }
                if (!document.getElementById('open-sidebar-btn')._listenerAttached) {
                    document.getElementById('open-sidebar-btn').addEventListener('click', openSidebar);
                    document.getElementById('open-sidebar-btn')._listenerAttached = true;
                }
                if (!document.getElementById('close-sidebar-btn')._listenerAttached) {
                    document.getElementById('close-sidebar-btn').addEventListener('click', closeSidebar);
                    document.getElementById('close-sidebar-btn')._listenerAttached = true;
                }
                if (!document.getElementById('sidebar-overlay')._listenerAttached) {
                    document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
                    document.getElementById('sidebar-overlay')._listenerAttached = true;
                }


                navContainer.innerHTML = ''; 
                let activeModuleTitle = '';
                
                journeySteps.forEach(step => {
                    const isUnlocked = unlockedSteps.includes(step.id);
                    const isActive = step.id === currentStepId;
                    const isCompleted = isUnlocked && !isActive && unlockedSteps.indexOf(step.id) < unlockedSteps.indexOf(currentStepId);

                    let state = 'locked';
                    let icon = icons.locked;

                    if (isActive) {
                        state = 'active';
                        icon = step.icon; // Use the step's own icon
                        activeModuleTitle = step.title;
                    } else if (isCompleted) {
                        state = 'completed';
                        icon = icons.completed; // Use the green check icon
                    } else if (isUnlocked) {
                        // Unlocked but not active and not completed (e.g., user clicked back)
                        state = 'completed'; // Treat as 'completed' for navigation
                        icon = step.icon;
                    }
                    
                    const button = document.createElement('button');
                    button.id = `nav-${step.id}`;
                    button.className = 'sidebar-item';
                    button.dataset.state = state;
                    button.innerHTML = `${icon} <span class="flex-1">${step.title}</span>`;
                    
                    if (isUnlocked) {
                        button.addEventListener('click', () => {
                            currentStepId = step.id;
                            saveUserData(); // Save the new step
                            mainRouter();
                            if (isSidebarOpen) closeSidebar(); 
                        });
                    }
                    navContainer.appendChild(button);
                });
                
                document.getElementById('mobile-page-title').textContent = activeModuleTitle;
            };

            const renderAppLayout = () => {
                appContainer.innerHTML = htmlTemplates_AppLayout;
                // Note: renderSidebarNav() is now called *after* this in mainRouter()
            };
            
            // --- SECTION 3: MODULE: AUTHENTICATION ---
            
            const htmlTemplates_Auth = `
                <div class="flex items-center justify-center min-h-[80vh]">
                    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md mx-4">
                        <h2 id="auth-title" class="text-3xl font-extrabold text-center text-gray-800 mb-8"></h2>
                        <div class="flex flex-col space-y-4">
                            <input id="email" type="email" placeholder="آدرس ایمیل" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition-all"/>
                            <input id="password" type="password" placeholder="رمز عبور" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition-all"/>
                            <p class="text-xs leading-6 text-gray-500 bg-gray-50 border border-gray-200 rounded-lg p-3">
                                نسخه فعلی برای تست است و اطلاعات فقط در همین مرورگر ذخیره می‌شود. از رمز عبور واقعی یا اطلاعات بسیار حساس استفاده نکنید.
                            </p>
                            <button id="auth-button" class="w-full py-3 bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-700 transition-all"></button>
                            <button id="toggle-mode-button" class="text-sm text-blue-500 hover:text-blue-700 mt-2"></button>
                        </div>
                        <div class="mt-8 pt-4 border-t">
                            <button id="clear-all-data-button" class="text-xs text-gray-500 hover:text-red-600 w-full">فراموشی رمز عبور یا حذف کامل اطلاعات</button>
                        </div>
                    </div>
                </div>
            `;

            const renderAuthForm = () => {
                appContainer.innerHTML = htmlTemplates_Auth; 
                
                document.getElementById('auth-title').textContent = isLoginMode ? 'ورود به حساب کاربری' : 'ایجاد حساب کاربری';
                document.getElementById('auth-button').textContent = isLoginMode ? 'ورود' : 'ثبت‌نام';
                document.getElementById('toggle-mode-button').textContent = isLoginMode ? 'حساب کاربری ندارید؟ ثبت‌نام کنید.' : 'قبلاً ثبت‌نام کرده‌اید؟ وارد شوید.';
                document.getElementById('auth-button').addEventListener('click', handleAuth);
                document.getElementById('toggle-mode-button').addEventListener('click', () => {
                    isLoginMode = !isLoginMode;
                    renderAuthForm();
                });
                document.getElementById('clear-all-data-button').addEventListener('click', handleClearAllData);
            };
            
            const handleAuth = () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                let users = JSON.parse(localStorage.getItem('users')) || {};
                
                if (!email || !password) {
                    showMessage("ایمیل و رمز عبور نمی‌توانند خالی باشند.", true);

                ['تغییر در اشتها',['من تغییری در اشتهایم تجربه نمی‌کنم.','اشتهایم کمی کمتر یا بیشتر شده است.','اشتهایم به مراتب کمتر یا بیشتر شده است.','اصلاً اشتها ندارم یا همیشه اشتها دارم.']],
                ['اشکال در تمرکز',['من می‌توانم به خوبی گذشته تمرکز داشته باشم.','نمی‌توانم به خوبی گذشته تمرکز داشته باشم.','تمرکز طولانی برایم خیلی سخت است.','نمی‌توانم روی هیچ چیزی تمرکز کنم.']],
                ['خستگی یا کسالت',['من بیشتر از حد معمول خسته نیستم.','زودتر از حد معمول خسته می‌شوم.','آن‌قدر خسته می‌شوم که بسیاری از کارهای قبلی را نمی‌توانم انجام دهم.','آن‌قدر خسته می‌شوم که اغلب کارهای قبلی را نمی‌توانم انجام دهم.']],
                ['از دست دادن علاقه جنسی',['تغییر تازه‌ای در علاقه جنسی‌ام ندیده‌ام.','کمتر از گذشته علاقه دارم.','به مراتب کمتر علاقه دارم.','علاقه جنسی‌ام را کاملاً از دست داده‌ام.']]
            ];
            const renderBDIModule = () => {
                const pageContainer = document.getElementById('page-content-container');
                const entries = moduleGet('bdiEntries', []);
                pageContainer.innerHTML = `<div class="space-y-6"><div class="bg-white p-6 rounded-2xl shadow border flex flex-wrap justify-between gap-3"><div><h1 class="text-3xl font-extrabold text-green-800">تست افسردگی BDI-II</h1><p class="text-gray-600 mt-2">در هر گروه فقط یک گزینه را انتخاب کنید.</p></div>${otherBackButton()}</div><div class="bg-red-50 text-red-800 border border-red-200 rounded-2xl p-4 font-semibold">اگر در آیتم ۹ نمره بالاتر از صفر ثبت شود، پیگیری درمانگر یا خدمات حمایتی ضروری است.</div><div class="bg-white rounded-2xl shadow border p-6"><div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"><input id="bdi-date" type="date" value="${todayISO()}" class="p-3 border rounded-xl"><input id="bdi-title" placeholder="عنوان/یادداشت کوتاه" class="p-3 border rounded-xl"><input id="bdi-name" placeholder="نام یا کد، اختیاری" class="p-3 border rounded-xl"></div><div class="space-y-4">${bdiItemsFinal.map((it,i)=>`<div class="rounded-2xl border bg-gray-50 p-4"><p class="font-bold text-green-800 mb-3">${i+1}. ${it[0]}</p><div class="space-y-2">${it[1].map((txt,v)=>`<label class="flex gap-3 rounded-xl border bg-white p-3 cursor-pointer hover:bg-green-50"><input type="radio" name="bdi-q-${i}" value="${v}" class="mt-1"><span class="rounded-lg bg-green-100 text-green-700 font-bold px-2 h-fit">${v}</span><span>${txt}</span></label>`).join('')}</div></div>`).join('')}</div><div class="mt-6 flex flex-wrap gap-3"><button id="bdi-calc" class="px-6 py-3 bg-green-700 text-white rounded-xl font-bold">محاسبه</button><button id="bdi-save" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold">ذخیره</button></div><div id="bdi-result" class="hidden mt-6 rounded-2xl bg-green-50 border border-green-200 p-5"></div></div><div class="bg-gray-100 p-6 rounded-2xl shadow-inner"><h2 class="text-2xl font-bold mb-4">تاریخچه</h2><div id="bdi-history" class="space-y-3"></div></div></div>`;
                attachBackToOther();
                const getAnswers=()=>bdiItemsFinal.map((_,i)=>{const x=document.querySelector(`input[name="bdi-q-${i}"]:checked`);return x?Number(x.value):null;});
                const calc=(silent=false)=>{const ans=getAnswers();const miss=ans.map((a,i)=>a===null?i+1:null).filter(Boolean); if(miss.length){if(!silent)showMessage('موارد ناقص: '+miss.join('، '),true);return null;} const score=ans.reduce((a,b)=>a+b,0); const interp=depressionInterpretation(score); const risk=ans[8]>0; document.getElementById('bdi-result').classList.remove('hidden'); document.getElementById('bdi-result').innerHTML=`<div class="text-4xl font-extrabold text-green-800">${score}</div><p class="font-bold mt-2">${interp}</p>${risk?'<p class="mt-3 rounded-xl bg-red-100 text-red-800 p-3 font-bold">هشدار: آیتم افکار خودکشی/تمایل به خودکشی مثبت است و نیاز به ارزیابی فوری دارد.</p>':''}`; return {ans,score,interp,risk};};
                const renderHist=()=>{document.getElementById('bdi-history').innerHTML=entries.length?entries.map(e=>`<div class="bg-white rounded-xl border p-4"><div class="flex flex-wrap justify-between gap-2"><b>${escapeHtml(e.title||'ثبت بدون عنوان')}</b><span class="rounded-full bg-green-100 text-green-700 px-3 py-1 text-xs font-bold">${e.score} - ${e.interp}</span>${e.risk?'<span class="rounded-full bg-red-100 text-red-700 px-3 py-1 text-xs font-bold">آیتم ۹ مثبت</span>':''}</div><p class="text-xs text-gray-500 mt-1">${escapeHtml(e.date||'')}</p>${renderScoreBar(e.score,63)}</div>`).join(''):emptyState('هنوز نتیجه‌ای ذخیره نشده است.');};
                renderHist(); document.getElementById('bdi-calc').addEventListener('click',()=>calc(false)); document.getElementById('bdi-save').addEventListener('click',()=>{const r=calc(true); if(!r){showMessage('قبل از ذخیره همه موارد را کامل کنید.',true);return;} const e={id:Date.now().toString(),date:document.getElementById('bdi-date').value,title:document.getElementById('bdi-title').value.trim(),personName:document.getElementById('bdi-name').value.trim(),score:r.score,interp:r.interp,risk:r.risk,answers:r.ans}; moduleSet('bdiEntries',[e,...entries]); showMessage('نتیجه افسردگی ذخیره شد.'); renderBDIModule();});
            };

            const renderAttentionModule = () => {
                const pageContainer = document.getElementById('page-content-container');
                const entries = moduleGet('attentionEntries', []);
                const methods = ['نام بردن و شمارش وسایل محیط', 'بازی اسم', 'هجی کردن کلمات', 'هجی برعکس کلمات'];
                pageContainer.innerHTML = `<div class="space-y-6"><div class="bg-white p-6 rounded-2xl shadow border flex flex-wrap justify-between gap-3"><div><h1 class="text-3xl font-extrabold text-cyan-800">تکنیک توجه‌برگردانی</h1><p class="text-gray-600 mt-2">هدف حذف فکر نیست؛ هدف این است که فکر از مرکز توجه خارج شود.</p></div>${otherBackButton()}</div><div class="bg-white rounded-2xl shadow border p-6"><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><input id="att-date" type="date" value="${todayISO()}" class="p-3 border rounded-xl"><input id="att-title" placeholder="عنوان کوتاه" class="p-3 border rounded-xl"><input id="att-before" type="number" min="0" max="10" placeholder="شدت قبل ۰ تا ۱۰" class="number-input p-3 border rounded-xl text-center"></div><textarea id="att-thought" rows="3" class="w-full p-3 border rounded-xl mt-4" placeholder="فکر مزاحم یا موضوع درگیرکننده..."></textarea><div class="grid grid-cols-1 md:grid-cols-4 gap-3 mt-4">${methods.map((m,i)=>`<label class="rounded-xl border bg-gray-50 p-3 cursor-pointer hover:bg-cyan-50"><input type="radio" name="att-method" value="${m}" class="ml-2">${i+1}. ${m}</label>`).join('')}</div><textarea id="att-notes" rows="3" class="w-full p-3 border rounded-xl mt-4" placeholder="در طول تمرین چه کار کردید؟"></textarea><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4"><input id="att-after" type="number" min="0" max="10" placeholder="شدت بعد ۰ تا ۱۰" class="number-input p-3 border rounded-xl text-center"><input id="att-next" placeholder="قدم بعدی" class="p-3 border rounded-xl"></div><div class="mt-6 flex flex-wrap gap-3"><button id="att-save" class="px-6 py-3 bg-cyan-700 text-white rounded-xl font-bold">ذخیره تمرین</button></div></div><div class="bg-gray-100 p-6 rounded-2xl shadow-inner"><h2 class="text-2xl font-bold mb-4">تاریخچه</h2><div id="att-history" class="space-y-3">${entries.length?entries.map(e=>`<div class="bg-white rounded-xl border p-4"><div class="flex flex-wrap justify-between gap-2"><b>${escapeHtml(e.title||'تمرین توجه‌برگردانی')}</b><span class="rounded-full bg-cyan-100 text-cyan-800 px-3 py-1 text-xs font-bold">${escapeHtml(e.method||'')}</span></div><p class="text-sm text-gray-600 mt-2">${escapeHtml(e.thought||'')}</p><p class="text-xs text-gray-500 mt-1">${escapeHtml(e.date||'')}</p>${renderScoreBar(e.after ?? 0,10)}<p class="text-sm mt-2">قبل: <b>${e.before ?? '-'}</b> | بعد: <b>${e.after ?? '-'}</b></p></div>`).join(''):emptyState('هنوز تمرینی ذخیره نشده است.')}</div></div></div>`;
                attachBackToOther();
                document.getElementById('att-save').addEventListener('click',()=>{const method=document.querySelector('input[name="att-method"]:checked')?.value||''; const e={id:Date.now().toString(),date:document.getElementById('att-date').value,title:document.getElementById('att-title').value.trim(),thought:document.getElementById('att-thought').value.trim(),before:numVal('att-before'),after:numVal('att-after'),method,notes:document.getElementById('att-notes').value.trim(),next:document.getElementById('att-next').value.trim()}; if(e.before===null||e.after===null||!method){showMessage('شدت قبل/بعد و روش را کامل کنید.',true);return;} moduleSet('attentionEntries',[e,...entries]); showMessage('تمرین توجه‌برگردانی ذخیره شد.'); renderAttentionModule();});
            };

            const renderPredictionModule = () => {
                const pageContainer = document.getElementById('page-content-container');
                const entries = moduleGet('predictionEntries', []);
                const reviewed = entries.filter(e=>e.status !== 'در انتظار بررسی');
                const happened = reviewed.filter(e=>e.status==='اتفاق افتاد'||e.status==='تا حدی اتفاق افتاد').length;
                const accuracy = reviewed.length ? Math.round((happened/reviewed.length)*100)+'٪' : '-';
                pageContainer.innerHTML = `<div class="space-y-6"><div class="bg-white p-6 rounded-2xl shadow border flex flex-wrap justify-between gap-3"><div><h1 class="text-3xl font-extrabold text-purple-800">تکنیک پیشگویی‌های منفی</h1><p class="text-gray-600 mt-2">پیش‌بینی منفی ذهن را ثبت کنید و بعد با نتیجه واقعی مقایسه کنید.</p></div>${otherBackButton()}</div><div class="grid grid-cols-1 md:grid-cols-4 gap-3"><div class="bg-white p-4 rounded-xl border"><b class="text-2xl text-purple-800">${entries.length}</b><p class="text-xs text-gray-500">کل ثبت‌ها</p></div><div class="bg-white p-4 rounded-xl border"><b class="text-2xl text-purple-800">${entries.filter(e=>e.status==='در انتظار بررسی').length}</b><p class="text-xs text-gray-500">در انتظار بررسی</p></div><div class="bg-white p-4 rounded-xl border"><b class="text-2xl text-purple-800">${accuracy}</b><p class="text-xs text-gray-500">دقت تقریبی ذهن</p></div><div class="bg-white p-4 rounded-xl border"><b class="text-2xl text-purple-800">${entries.filter(e=>e.status==='اتفاق نیفتاد'||e.status==='کمتر از پیش‌بینی اتفاق افتاد').length}</b><p class="text-xs text-gray-500">اتفاق نیفتاده/کمتر رخ داده</p></div></div><div class="bg-white rounded-2xl shadow border p-6"><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><input id="pred-date" type="date" value="${todayISO()}" class="p-3 border rounded-xl"><input id="pred-title" placeholder="عنوان کوتاه" class="p-3 border rounded-xl"><input id="pred-prob" type="number" min="0" max="100" placeholder="احتمال از نظر ذهن ٪" class="p-3 border rounded-xl text-center"></div><textarea id="pred-text" rows="3" class="w-full p-3 border rounded-xl mt-4" placeholder="پیشگویی منفی من چیست؟"></textarea><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4"><textarea id="pred-result" rows="3" class="p-3 border rounded-xl" placeholder="نتیجه واقعی چه شد؟"></textarea><select id="pred-status" class="p-3 border rounded-xl"><option>در انتظار بررسی</option><option>اتفاق نیفتاد</option><option>کمتر از پیش‌بینی اتفاق افتاد</option><option>تا حدی اتفاق افتاد</option><option>اتفاق افتاد</option></select></div><textarea id="pred-learning" rows="3" class="w-full p-3 border rounded-xl mt-4" placeholder="از این تمرین چه یاد گرفتم؟"></textarea><button id="pred-save" class="mt-5 px-6 py-3 bg-purple-700 text-white rounded-xl font-bold">ذخیره پیشگویی</button></div><div class="bg-gray-100 p-6 rounded-2xl shadow-inner"><h2 class="text-2xl font-bold mb-4">تاریخچه</h2><div class="space-y-3">${entries.length?entries.map(e=>`<div class="bg-white rounded-xl border p-4"><div class="flex flex-wrap justify-between gap-2"><b>${escapeHtml(e.title||'پیشگویی بدون عنوان')}</b><span class="rounded-full bg-purple-100 text-purple-700 px-3 py-1 text-xs font-bold">${escapeHtml(e.status)}</span></div><p class="text-sm text-gray-700 mt-2"><b>پیشگویی:</b> ${escapeHtml(e.text||'')}</p><p class="text-sm text-gray-700 mt-1"><b>نتیجه:</b> ${escapeHtml(e.result||'ثبت نشده')}</p><p class="text-xs text-gray-500 mt-1">${escapeHtml(e.date||'')} | احتمال اولیه: ${e.prob ?? '-'}٪</p>${renderScoreBar(e.prob ?? 0,100)}</div>`).join(''):emptyState('هنوز پیشگویی‌ای ذخیره نشده است.')}</div></div></div>`;
                attachBackToOther();
                document.getElementById('pred-save').addEventListener('click',()=>{const e={id:Date.now().toString(),date:document.getElementById('pred-date').value,title:document.getElementById('pred-title').value.trim(),prob:numVal('pred-prob'),text:document.getElementById('pred-text').value.trim(),result:document.getElementById('pred-result').value.trim(),status:document.getElementById('pred-status').value,learning:document.getElementById('pred-learning').value.trim()}; if(!e.text||e.prob===null){showMessage('متن پیشگویی و احتمال اولیه را وارد کنید.',true);return;} moduleSet('predictionEntries',[e,...entries]); showMessage('پیشگویی ذخیره شد.'); renderPredictionModule();});
            };

            // --- SECTION 11: APP DEFINITION & ROUTER ---
            
            // NEW: This is now the single source of truth for the user journey
            const journeySteps = [
                {
                    id: 'screening',
                    title: 'گام ۱: تست غربالگری',
                    icon: icons.screening,
                    renderFunction: renderScreeningPage,
                },
                {
                    id: 'pathIntro',
                    title: 'گام ۲: راهنمای مطالعه',
                    icon: icons.intro,
                    renderFunction: renderPathIntroPage,
                },
                {
                    id: 'thoughtLog',
                    title: 'گام ۳: ثبت افکار',
                    icon: icons.log,
                    renderFunction: renderThoughtLogPage,
                },
                {
                    id: 'identifyThoughts',
                    title: 'گام ۴: شناخت خطاها',
                    icon: icons.identify,
                    renderFunction: renderIdentifyThoughtsPage,
                },
                {
                    id: 'thoughtChallenge',
                    title: 'گام ۵: چالش افکار',
                    icon: icons.challenge,
                    renderFunction: renderThoughtChallengePage,
                },
                {
                    id: 'relaxation',
                    title: 'گام ۶: تکنیک ریلکسیشن',
                    icon: icons.balance,
                    renderFunction: renderRelaxationPage,
                },
                {
                    id: 'otherTests',
                    title: 'گام ۷: سایر تست‌ها',
                    icon: icons.screening,
                    renderFunction: renderOtherTestsPage,
                }
            ];
            
            const mainRouter = () => {
                // 1. Load/Refresh State for globals: currentUser, unlockedSteps, etc.
                loadUserData(); 

                if (!currentUser) {
                    // 2. Not logged in: Render Auth Form directly into appContainer
                    appContainer.innerHTML = htmlTemplates_Auth;
                    renderAuthForm(); 
                    return;
                }
                
                // 3. Logged in: Render main application shell
                // Ensure layout is rendered
                if (!document.getElementById('sidebar')) {
                    renderAppLayout();
                }

                // 4. Render the sidebar navigation
                renderSidebarNav(); 

                // 5. Find and render the current page
                const step = journeySteps.find(s => s.id === currentStepId);
                
                if (step && unlockedSteps.includes(step.id)) {
                    step.renderFunction(); 
                } else {
                    // Fallback: Go to first unlocked step
                    currentStepId = unlockedSteps[0] || 'screening';
                    journeySteps.find(s => s.id === currentStepId).renderFunction(); 
                }
                
                saveUserData();
            };
            
            // --- Initial Load ---
            mainRouter();
        });
    </script>

    <!-- 4. FOOTER -->
    <footer class="w-full bg-white text-gray-500 text-center py-3 border-t border-gray-200 text-xs flex-shrink-0">
        <p>Adel Marzban = code engineering | Hamid Shamseh = psychological methods</p>
        <p class="mt-1">adelmarzban.github.io | powered with google gemini</p>
    </footer>

</body>
